<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Nhà Trọ{% endblock %} — Quản Lý Nhà Trọ</title>

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<nav id="sidebar">
  <a href="/" class="sidebar-brand">
    <span>🏠</span> Nhà Trọ
  </a>

  <ul class="nav flex-column mt-2 flex-grow-1">
    <li class="nav-item">
      <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="/phong"><i class="bi bi-door-open"></i> Phòng</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="/khach-thue"><i class="bi bi-people"></i> Khách Thuê</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="/hop-dong" id="nav-hopdong">
        <i class="bi bi-file-earmark-text"></i> Hợp Đồng
        <span id="badge-sap-het-han" class="badge bg-danger ms-auto d-none">0</span>
      </a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="/bang-gia"><i class="bi bi-currency-dollar"></i> Bảng Giá</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="/thanh-toan"><i class="bi bi-clipboard-check"></i> TT Tháng</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="/hoa-don"><i class="bi bi-receipt"></i> Hóa Đơn</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="/thong-ke"><i class="bi bi-bar-chart-line"></i> Thống Kê</a>
    </li>
  </ul>

  <div class="p-3 mt-auto" style="border-top:1px solid rgba(255,255,255,.1)">
    <small class="text-white-50">v1.0</small>
  </div>
</nav>

<!-- ===== MAIN ===== -->
<div id="main-wrapper">
  <!-- Topbar -->
  <div id="topbar">
    <button class="btn btn-sm btn-outline-secondary me-3 d-md-none" id="sidebar-toggler">
      <i class="bi bi-list"></i>
    </button>
    <span class="page-title">{% block page_title %}{% endblock %}</span>
  </div>

  <!-- Content -->
  <main id="page-content">
    {% block content %}{% endblock %}
  </main>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<!-- Shared utils -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<!-- Sidebar badge: hợp đồng sắp hết hạn -->
<script>
  fetch('/api/thong-ke/dashboard')
    .then(r => r.json())
    .then(d => {
      if (d.success && d.data.sap_het_han > 0) {
        const badge = document.getElementById('badge-sap-het-han');
        if (badge) {
          badge.textContent = d.data.sap_het_han;
          badge.classList.remove('d-none');
        }
      }
    }).catch(() => {});
</script>

{% block extra_scripts %}{% endblock %}
</body>
</html>
