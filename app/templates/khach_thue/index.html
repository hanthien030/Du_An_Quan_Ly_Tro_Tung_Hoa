{% extends "base.html" %}
{% block title %}Khách Thuê{% endblock %}
{% block page_title %}Quản Lý Khách Thuê{% endblock %}

{% block content %}
<div class="d-flex flex-wrap gap-2 align-items-center mb-3">
  <button class="btn btn-primary btn-sm" onclick="openModal()">
    <i class="bi bi-person-plus me-1"></i>Thêm Khách
  </button>
  <div class="input-group input-group-sm w-auto">
    <span class="input-group-text"><i class="bi bi-search"></i></span>
    <input type="text" class="form-control" id="search-q" placeholder="Tên, CCCD, SĐT..." oninput="loadKhach()" style="width:200px">
  </div>
</div>

<div class="card">
  <div class="table-responsive">
    <table class="table table-hover mb-0 align-middle">
      <thead class="table-light">
        <tr>
          <th>Họ tên</th><th>CCCD</th><th>SĐT</th>
          <th>Phòng hiện tại</th><th>Loại</th><th class="text-end">Hành động</th>
        </tr>
      </thead>
      <tbody id="khach-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="khachModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title">Thêm Khách</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="row g-2 mb-2">
          <div class="col-8">
            <label class="form-label">Họ tên <span class="text-danger">*</span></label>
            <input class="form-control" id="f-ho_ten">
          </div>
          <div class="col-4">
            <label class="form-label">Ngày sinh</label>
            <input class="form-control" type="date" id="f-ngay_sinh">
          </div>
        </div>
        <div class="row g-2 mb-2">
          <div class="col-6">
            <label class="form-label">CCCD</label>
            <input class="form-control" id="f-cccd">
          </div>
          <div class="col-6">
            <label class="form-label">SĐT</label>
            <input class="form-control" id="f-sdt">
          </div>
        </div>
        <div class="mb-2">
          <label class="form-label">Địa chỉ</label>
          <input class="form-control" id="f-dia_chi">
        </div>
        <div class="mb-2">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" id="f-email">
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="f-la_chinh" checked>
          <label class="form-check-label" for="f-la_chinh">Người thuê chính</label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Hủy</button>
        <button class="btn btn-primary btn-sm" onclick="saveKhach()">Lưu</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let khachModal;
document.addEventListener('DOMContentLoaded', () => {
  khachModal = new bootstrap.Modal(document.getElementById('khachModal'));
  loadKhach();
});

async function loadKhach() {
  const q = document.getElementById('search-q').value;
  const url = q ? `/api/khach-thue?q=${encodeURIComponent(q)}` : '/api/khach-thue';
  try {
    const { data } = await fetchAPI(url);
    const tbody = document.getElementById('khach-tbody');
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" class="text-muted text-center py-3">Không có dữ liệu</td></tr>'; return; }
    tbody.innerHTML = data.map(k => `
      <tr>
        <td class="fw-semibold">${k.ho_ten}</td>
        <td><small>${k.cccd || '—'}</small></td>
        <td>${k.sdt || '—'}</td>
        <td>${k.so_phong_hien_tai ? `<a href="/phong" class="badge bg-success text-decoration-none">P${k.so_phong_hien_tai}</a>` : '<span class="text-muted small">—</span>'}</td>
        <td>${k.la_chinh ? '<span class="badge bg-primary">Chính</span>' : '<span class="badge bg-secondary">Phụ</span>'}</td>
        <td class="text-end">
          <button class="btn btn-sm btn-outline-primary" onclick="openModal(${JSON.stringify(k).replace(/"/g,'&quot;')})"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger ms-1" onclick="deleteKhach(${k.khach_id})"><i class="bi bi-trash"></i></button>
        </td>
      </tr>`).join('');
  } catch (e) { showToast(e.message, 'danger'); }
}

function openModal(k = null) {
  document.getElementById('modal-title').textContent = k ? 'Sửa Khách' : 'Thêm Khách';
  document.getElementById('edit-id').value   = k?.khach_id || '';
  document.getElementById('f-ho_ten').value  = k?.ho_ten || '';
  document.getElementById('f-cccd').value    = k?.cccd || '';
  document.getElementById('f-ngay_sinh').value = k?.ngay_sinh || '';
  document.getElementById('f-sdt').value     = k?.sdt || '';
  document.getElementById('f-dia_chi').value = k?.dia_chi || '';
  document.getElementById('f-email').value   = k?.email || '';
  document.getElementById('f-la_chinh').checked = k?.la_chinh !== false;
  khachModal.show();
}

async function saveKhach() {
  const id = document.getElementById('edit-id').value;
  const body = {
    ho_ten:    document.getElementById('f-ho_ten').value.trim(),
    cccd:      document.getElementById('f-cccd').value.trim() || null,
    ngay_sinh: document.getElementById('f-ngay_sinh').value || null,
    sdt:       document.getElementById('f-sdt').value.trim() || null,
    dia_chi:   document.getElementById('f-dia_chi').value.trim() || null,
    email:     document.getElementById('f-email').value.trim() || null,
    la_chinh:  document.getElementById('f-la_chinh').checked,
  };
  if (!body.ho_ten) { showToast('Nhập họ tên', 'warning'); return; }
  try {
    id ? await fetchAPI(`/api/khach-thue/${id}`, 'PUT', body)
       : await fetchAPI('/api/khach-thue', 'POST', body);
    showToast(id ? 'Đã cập nhật' : 'Đã thêm khách');
    khachModal.hide();
    loadKhach();
  } catch (e) { showToast(e.message, 'danger'); }
}

async function deleteKhach(id) {
  if (!confirm('Xóa khách này?')) return;
  try {
    await fetchAPI(`/api/khach-thue/${id}`, 'DELETE');
    showToast('Đã xóa');
    loadKhach();
  } catch (e) { showToast(e.message, 'danger'); }
}
</script>
{% endblock %}
