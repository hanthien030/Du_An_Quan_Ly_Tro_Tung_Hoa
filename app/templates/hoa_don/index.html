{% extends "base.html" %}
{% block title %}Hóa Đơn{% endblock %}
{% block page_title %}Hóa Đơn Tháng{% endblock %}

{% block content %}
<div class="card p-3 mb-3">
  <div class="d-flex flex-wrap gap-2 align-items-center">
    <select class="form-select form-select-sm w-auto" id="sel-thang"></select>
    <select class="form-select form-select-sm w-auto" id="sel-nam"></select>
    <button class="btn btn-sm btn-outline-secondary" onclick="loadHD()">
      <i class="bi bi-arrow-clockwise me-1"></i>Xem
    </button>
    <button class="btn btn-sm btn-primary" onclick="generateAll()">
      <i class="bi bi-lightning-charge me-1"></i>Tính tất cả hóa đơn
    </button>
  </div>
</div>

<div class="card">
  <div class="table-responsive">
    <table class="table table-hover mb-0 align-middle">
      <thead class="table-light">
        <tr>
          <th>Phòng</th><th>Khách</th>
          <th class="text-end">Tiền phòng</th>
          <th class="text-end">Điện</th>
          <th class="text-end">Nước</th>
          <th class="text-end">Dịch vụ</th>
          <th class="text-end">Tổng</th>
          <th class="text-center">Trạng thái</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="hd-tbody"></tbody>
      <tfoot>
        <tr class="table-secondary fw-semibold">
          <td colspan="6" class="text-end">Tổng doanh thu:</td>
          <td class="text-end" id="tfoot-tong">—</td>
          <td colspan="2"></td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  fillMonthYearSelects('sel-thang', 'sel-nam');
  loadHD();
});

async function loadHD() {
  const thang = document.getElementById('sel-thang').value;
  const nam = document.getElementById('sel-nam').value;
  try {
    const { data } = await fetchAPI(`/api/hoa-don/${thang}/${nam}`);
    const tbody = document.getElementById('hd-tbody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="text-muted text-center py-3">Chưa có hóa đơn. Bấm "Tính tất cả hóa đơn".</td></tr>';
      document.getElementById('tfoot-tong').textContent = formatVND(0);
      return;
    }
    let tong = 0;
    tbody.innerHTML = data.map(h => {
      tong += h.tong_tien;
      const isDone = h.trang_thai === 'da_tt';
      return `<tr>
        <td><strong>${h.so_phong}</strong></td>
        <td>${h.ho_ten}</td>
        <td class="text-end">${formatVND(h.tien_phong)}</td>
        <td class="text-end">${formatVND(h.tien_dien)}</td>
        <td class="text-end">${formatVND(h.tien_nuoc)}</td>
        <td class="text-end">${formatVND(h.phi_dich_vu)}</td>
        <td class="text-end fw-bold">${formatVND(h.tong_tien)}</td>
        <td class="text-center"><span class="badge ${isDone ? 'badge-da_tt' : 'badge-chua_tt'}">${isDone ? '✅ Đã TT' : '⬜ Chưa TT'}</span></td>
        <td class="text-end">
          <a class="btn btn-sm btn-outline-primary" href="/hoa-don/detail/${h.hoadon_id}"><i class="bi bi-eye"></i></a>
          <a class="btn btn-sm btn-outline-danger ms-1" href="/api/hoa-don/${h.hoadon_id}/pdf" target="_blank"><i class="bi bi-file-pdf"></i></a>
        </td>
      </tr>`;
    }).join('');
    document.getElementById('tfoot-tong').textContent = formatVND(tong);
  } catch (e) {
    showToast(e.message, 'danger');
  }
}

async function generateAll() {
  const thang = document.getElementById('sel-thang').value;
  const nam = document.getElementById('sel-nam').value;
  if (!confirm(`Tính hóa đơn tất cả phòng tháng ${thang}/${nam}?`)) return;
  try {
    const { data } = await fetchAPI(`/api/hoa-don/generate-all/${thang}/${nam}`, 'POST');
    const errMsg = data.errors.length ? ` (${data.errors.length} lỗi)` : '';
    showToast(`Đã tính ${data.generated.length} hóa đơn${errMsg}`, data.errors.length ? 'warning' : 'success');
    loadHD();
  } catch (e) {
    showToast(e.message, 'danger');
  }
}
</script>
{% endblock %}
